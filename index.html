<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新加坡魚尾獅之旅🇸🇬</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5ECD7; --card:#FFFBF2; --border:#D9C49A; --border-l:#EAD9B5;
  --accent:#C47F2E; --accent-l:#F0D49A;
  --brown-d:#3E2100; --brown-m:#6B4226; --brown-l:#9C7045;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}

/* 核心修正：調降基準字體，讓一屏能塞入更多內容 */
html { font-size: 15px; } 
.wrap { padding: 8px 8px 0; } 

body{
  font-family:'Noto Sans TC',sans-serif;
  background-color:var(--bg);
  color:var(--brown-d);
  overflow-x: hidden;
  padding-bottom: 70px;
}

/* Header 精簡化：縮小高度以節省空間 */
.header-wrap {
  background:var(--card);
  border-bottom:3px solid var(--border);
  padding:15px 10px 10px; 
  border-radius: 0 0 20px 20px; 
  text-align:center;
}
.h-guide{font-size:0.6rem; color:var(--brown-l); letter-spacing:.1em; margin-bottom:2px;}
.h-title{font-size:1.3rem; font-weight:900; color:var(--brown-d); line-height:1.1;}
.h-sub {font-size:0.7rem; color:var(--brown-l); margin-top:4px;}

/* Tabs 緊湊化 */
.tabs-wrap{position:sticky; top:0; z-index:100; background:rgba(245,236,215,.95); backdrop-filter:blur(4px); border-bottom:1px solid var(--border); padding:6px 8px;}
.tabs{display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0; border-radius:15px; padding:6px 12px; font-size:0.75rem; font-weight:700; border:1.5px solid var(--border); background:var(--card); color:var(--brown-m); white-space:nowrap;}
.tab.active{background:var(--accent); color:#FFF8EC; border-color:var(--accent);}

/* Banner 精簡化 */
.banner{background:#FFF8E6; border:1.5px solid var(--accent-l); border-radius:12px; padding:8px 12px; margin-bottom:8px;}
.banner-t{font-size:0.75rem; font-weight:700;}

/* 卡片緊湊化：減少內距與間隙，目標是顯示三個卡片 */
.card{
  border-radius:16px; background:var(--card); border:1.5px solid var(--border-l); 
  box-shadow:0 3px 0 var(--border); padding:10px 12px; margin-bottom:8px;
}
.tag-row{display:flex; align-items:center; gap:6px; margin-bottom:4px;}
.tag{border-radius:8px; padding:3px 8px; font-size:0.65rem; font-weight:700;}
.t-food {background:#F5D5B0; color:#7A2E00;}
.t-spot {background:#D4EAC8; color:#2D5A1B;}
.time-pill{background:var(--accent-l); color:var(--brown-m); border-radius:8px; padding:3px 8px; font-size:0.65rem; font-weight:700;}
.loc{font-size:0.95rem; font-weight:900; color:var(--brown-d); line-height:1.2; margin:2px 0;}

.nav-btn {
  float: right; margin-left: 8px; padding: 6px 12px; 
  font-size: 0.7rem; background:var(--accent); color:#FFF8EC; border-radius:15px; 
  font-weight:700; text-decoration:none; border:none;
}

.tip-box{background:#FFF8E6; border-radius:10px; padding:6px 10px; margin-top:6px; border:1px dashed var(--accent-l);}
.desc{font-size:0.75rem; color:var(--brown-m); line-height:1.4;}

/* Footer 大小適中 */
.bnav{
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(255,251,242,.98); border-top:2px solid var(--border);
  display:flex; justify-content:space-around; padding:8px 0 20px; z-index:1000;
}
.ni{display:flex; flex-direction:column; align-items:center; color:var(--brown-l); font-size:0.7rem; gap:2px; background:none; border:none;}
.ni.active{color:var(--accent);}
.ni i{font-size:1.3rem;}

.pg{display:none;} .pg.on{display:block;}
#ldr{position:fixed; inset:0; background:#F5ECD7; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000;}
</style>
</head>
<body>

<div id="ldr">
  <i class="fas fa-paw fa-spin" style="font-size:2.5rem;color:var(--accent)"></i>
  <p style="margin-top:10px; font-weight:700;">貓貓縮小行程中...🐾</p>
</div>

<div class="header-wrap">
  <p class="h-guide">✦ SINGAPORE TRAVEL GUIDE ✦</p>
  <h1 class="h-title">新加坡魚尾獅之旅🇸🇬</h1>
  <p class="h-sub">5天4夜 ・ 4/13 – 4/17</p>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active">✈️ Day 1 4/13</button>
    <button class="tab">🎢 Day 2 4/14</button>
    <button class="tab">🦁 Day 3 4/15</button>
  </div>
</div>

<div class="wrap">
  <div id="pg-itinerary" class="pg on">
    <div class="banner">
      <p class="banner-t">✈️ Day 1 — 飛向新加坡 + 鈦坦辦公室 + Night Safari</p>
    </div>
    
    <div id="cards">
      <div class="card">
        <div class="card-top">
          <div class="tag-row">
            <span class="tag t-food">餐飲</span>
            <span class="time-pill">🕐 13:00</span>
          </div>
          <a href="https://www.google.com/maps/search/?api=1&query=$" class="nav-btn">導航</a>
          <p class="loc">黃亞細肉骨茶 Ng Ah Sio</p>
        </div>
        <div class="tip-box"><p class="desc">胡椒味很香的新加坡必吃！🍲</p></div>
      </div>

      <div class="card">
        <div class="card-top">
          <div class="tag-row">
            <span class="tag t-spot">景點</span>
            <span class="time-pill">🕐 19:15</span>
          </div>
          <a href="http://googleusercontent.com/maps.google.com/9" class="nav-btn">導航</a>
          <p class="loc">Night Safari 夜間動物園</p>
        </div>
        <div class="tip-box"><p class="desc">獅城必去，記得準時入場 🦁</p></div>
      </div>

      <div class="card">
        <div class="card-top">
          <div class="tag-row">
            <span class="tag t-spot">住宿</span>
          </div>
          <a href="https://www.google.com/maps/search/?api=1&query=JW+Marriott+Hotel+Singapore+South+Beach" class="nav-btn">導航</a>
          <p class="loc">JW Marriott South Beach</p>
        </div>
        <div class="tip-box"><p class="desc">放行李，稍微休息一下 🏨</p></div>
      </div>
    </div>
  </div>
</div>

<div class="bnav">
  <button onclick="showPg('itinerary')" class="ni active"><i class="fas fa-paw"></i><span>每日行程</span></button>
  <button onclick="showPg('info')" class="ni"><i class="fas fa-hotel"></i><span>航班住宿</span></button>
</div>

<script>
window.onload = function() {
  document.getElementById('ldr').style.display = 'none';
};
function showPg(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('on');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
